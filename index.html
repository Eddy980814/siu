<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>照過來 | 果然是林</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cookie&display=swap" rel="stylesheet">
<style>
  h1,h2,h3{font-family: 'Cookie', cursive;}
  body{font-family: 'Noto Sans TC', sans-serif;}
</style>
</head>
<body class="bg-amber-50 text-gray-800">

<!-- Header -->
<header class="bg-pink-100 py-8 text-center shadow-md">
  <h1 class="text-5xl font-bold text-pink-600">照過來</h1>
  <p class="text-xl mt-2 text-pink-800">果然是林</p>
</header>

<!-- 主視覺 Banner -->
<section class="relative">
  <img src="banner.jpg" alt="果乾、魷魚絲" class="w-full h-64 object-cover rounded-b-3xl">
  <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-center text-white">
    <h2 class="text-4xl font-bold drop-shadow-lg">天然安心零食</h2>
    <p class="mt-2 text-lg drop-shadow-md">每一口都是安心的美味</p>
  </div>
</section>

<!-- 品牌理念 -->
<section class="max-w-6xl mx-auto p-6 text-center">
  <h2 class="text-3xl font-bold text-pink-600 mb-4">我們的承諾</h2>
  <p class="text-lg text-gray-700 mb-2">嚴選食材、天然烘焙、無添加防腐劑</p>
  <p class="text-lg text-gray-700">每一口零食，都讓你吃得安心又開心！</p>
</section>

<!-- 產品區塊 -->
<section class="max-w-6xl mx-auto p-6">
  <h2 class="text-3xl font-bold text-pink-600 mb-6 text-center">產品介紹</h2>
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
    <!-- 草莓乾 -->
    <div class="bg-white p-4 rounded-2xl shadow-lg hover:scale-105 transition transform text-center">
      <img src="strawberry.jpg" alt="草莓乾" class="w-full h-48 object-cover rounded-xl mb-3">
      <h3 class="text-xl font-bold text-pink-500">草莓乾</h3>
      <p class="text-gray-700 mt-1">低溫烘焙，保留天然甜味，無添加防腐劑。</p>
    </div>
    <!-- 魷魚絲 -->
    <div class="bg-white p-4 rounded-2xl shadow-lg hover:scale-105 transition transform text-center">
      <img src="squid.jpg" alt="魷魚絲" class="w-full h-48 object-cover rounded-xl mb-3">
      <h3 class="text-xl font-bold text-pink-500">魷魚絲</h3>
      <p class="text-gray-700 mt-1">嚴選海域鮮魷，健康零嘴首選。</p>
    </div>
    <!-- 其他乾貨 -->
    <div class="bg-white p-4 rounded-2xl shadow-lg hover:scale-105 transition transform text-center">
      <img src="mixed.jpg" alt="其他乾貨" class="w-full h-48 object-cover rounded-xl mb-3">
      <h3 class="text-xl font-bold text-pink-500">多款乾貨</h3>
      <p class="text-gray-700 mt-1">各式水果、堅果與零食，天然美味滿分。</p>
    </div>
  </div>
</section>

<!-- 關於我們 -->
<section class="bg-amber-100 p-6 text-center">
  <h2 class="text-3xl font-bold text-pink-600 mb-4">關於照過來</h2>
  <p class="max-w-3xl mx-auto text-gray-700 mb-2">
    「照過來」是你的安心零食專家，我們用心挑選每一份食材，天然烘焙，讓你吃得健康又開心。
  </p>
  <p class="max-w-3xl mx-auto text-gray-700">
    從草莓乾到魷魚絲，每一口都代表我們的承諾：天然、安心、美味。
  </p>
</section>

<!-- 聯絡我們 -->
<section class="max-w-6xl mx-auto p-6 text-center">
  <h2 class="text-3xl font-bold text-pink-600 mb-4">聯絡我們</h2>
  <p class="text-gray-700 mb-4">有任何問題或想合作，歡迎與我們聯繫！</p>
  <form class="max-w-md mx-auto grid gap-4">
    <input type="text" placeholder="姓名" class="p-3 rounded-lg border border-gray-300">
    <input type="email" placeholder="Email" class="p-3 rounded-lg border border-gray-300">
    <textarea placeholder="內容" class="p-3 rounded-lg border border-gray-300"></textarea>
    <button type="submit" class="bg-pink-500 text-white p-3 rounded-lg hover:bg-pink-600 transition">送出訊息</button>
  </form>
</section>

<!-- Footer -->
<footer class="bg-pink-100 p-4 text-center mt-6 rounded-t-3xl">
  <p>© 2026 照過來 | 果然是林</p>
</footer>

</body>
</html>
